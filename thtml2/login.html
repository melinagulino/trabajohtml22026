<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
</head>
<body>
    <h1 style="font-family:  Georgia, 'Times New Roman', Times, serif; color: purple; font-size: 50px; ">Inicio de sesión</h1>

    <div style="border: 2px solid blueviolet; padding: 10px; width: 300px;">
       
        <p>Siga los pasos para iniciar sesión:</p>

        <ol>
            <li>Ingrese su usuario.</li>
            <li>Ingrese su contraseña.</li>
            <li>Presione el botón "Ingresar".</li>
        </ol>
    </div><br><br>

    <div style="border: 2px purple; ">
        <form action="#" method="post">

            <label for="usuario">Usuario:</label><br>
            <input type="text" id="usuario" name="usuario" required><br><br>

            <label for="clave">Contraseña:</label><br>
            <input type="password" id="clave" name="clave" required><br><br>

            <input type="checkbox" id="recordar" name="recordar">
            <label for="recordar">Recordar mis datos</label><br><br>

            <button type="submit">Ingresar</button>

        </form>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
</head>
<body>
    <div>
        <h1 style="text-align: center; font-family:  Georgia, 'Times New Roman', Times, serif; color: purple; font-size: 50px; ">Inicio de sesión</h1>
      
        <p style="font-size: 25px;">Siga los pasos para iniciar sesión:</p>

        <ol>
            <li style="font-size: 25px;">Ingrese su usuario.</li>
            <li style="font-size: 25px;">Ingrese su contraseña.</li>
            <li style="font-size: 25px;">Presione el botón "Ingresar".</li>
        </ol>
    </div><br><br>

    <div style="width: 300px; margin: auto; margin-top: 40px; background-color:plum; padding: 20px; border-radius: 10px;">
        <form action="#" method="post">

            <label for="usuario">Usuario:</label><br>
            <input type="text" id="usuario" name="usuario" required><br><br>

            <label for="clave">Contraseña:</label><br>
            <input type="password" id="clave" name="clave" required><br><br>

            <input type="checkbox" id="recordar" name="recordar">
            <label for="recordar">Recordar mis datos</label><br><br>

            <button type="submit">Ingresar</button>

        </form>
    </div>

</body>
</html>
